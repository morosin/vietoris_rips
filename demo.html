        const termElement = document.getElementById('terminal');
        const serializeAddon = new SerializeAddon.SerializeAddon();
        var term = new Terminal({ 
            convertEOL: false, 
            fontFamily: 'Iosevka Hex Mono', 
            fontSize: 15, 
            drawBoldTextInBrightColors: false // this is incorrect behavior for a terminal that supports 256 colors
        });
        term.open(document.getElementById('terminal'));
        term.loadAddon(serializeAddon);
        term.resize(144, 1080);
        term.write(text, () => { 
            const html = serializeAddon.serializeAsHTML({includeGlobalBackground: true});
            const tab = window.open("about_blank", "_blank");
            tab.document.write(html);
            tab.document.close();
        });
